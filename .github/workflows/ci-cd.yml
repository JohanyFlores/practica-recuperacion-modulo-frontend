name: CI/CD Pipeline

# Ejecutar el workflow en push a main y en pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Permisos necesarios para deploy a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar ejecuciones concurrentes del mismo workflow
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Ejecutar tests y build
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del código
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Instalar dependencias
      - name: 📦 Install dependencies
        run: npm ci

      # 4. Ejecutar tests
      - name: 🧪 Run tests
        run: npm run test -- --run

      # 5. Build del proyecto
      - name: 🏗️ Build project
        run: npm run build

      # 6. Subir artifacts del build
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Job 2: Deploy a GitHub Pages (solo en push a main/master)
  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. Descargar artifacts del build
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # 2. Configurar GitHub Pages
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      # 3. Subir a GitHub Pages
      - name: 📤 Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 4. Deploy a GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
